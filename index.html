<title>JOB365·職缺地圖</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg:#12151C; --bg-panel:#191E27; --bg-panel-hi:#212838; --border:#2A3140;
    --text:#ECEDEF; --text-muted:#8B93A1; --text-faint:#5B6273;
    --gold:#F2A93D; --teal:#4FBFAE; --coral:#E8674A; --periwinkle:#7C93F2; --violet:#C77DFF;
    --font-display:'Space Grotesk',sans-serif; --font-mono:'JetBrains Mono',monospace; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  ::selection{background:var(--gold);color:#12151C;}

  .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);}
  .nav__logo{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:600;font-size:15px;letter-spacing:.02em;}
  .hero__logo{height:44px;width:auto;display:block;margin:0 auto 18px;}
  .nav__links{display:flex;gap:22px;font-size:13px;color:var(--text-muted);}
  .nav__links a{text-decoration:none;transition:color .15s;}
  .nav__links a:hover{color:var(--gold);}

  .hero{position:relative;padding:56px 32px 32px;overflow:hidden;border-bottom:1px solid var(--border);}
  .hero__sky{position:absolute;inset:0;pointer-events:none;}
  .hero__dot{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:0;animation:twinkle 4s ease-in-out infinite;}
  .shooting-star{position:absolute;width:3px;height:3px;background:#fff;border-radius:50%;box-shadow:0 0 6px 1px rgba(255,255,255,.9);pointer-events:none;}
  .shooting-star::before{content:"";position:absolute;top:50%;right:50%;width:90px;height:1.5px;background:linear-gradient(90deg, transparent, rgba(255,255,255,.9));transform:translateY(-50%);}
  @keyframes twinkle{0%,100%{opacity:0;}50%{opacity:.85;}}
  .hero__content{position:relative;max-width:760px;margin:0 auto;text-align:center;}
  .hero__eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:14px;}
  .hero h1{font-family:var(--font-display);font-size:clamp(26px,4vw,40px);line-height:1.28;font-weight:700;margin:0 0 12px;}
  .hero h1 span{color:var(--gold);}
  .hero p{color:var(--text-muted);font-size:14px;line-height:1.7;margin:0 auto 24px;max-width:520px;}

  .search{display:flex;gap:8px;max-width:560px;margin:0 auto 20px;background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:6px;}
  .search input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;}
  .search input::placeholder{color:var(--text-faint);}
  .search button{background:var(--gold);color:#1A1207;border:none;border-radius:8px;padding:0 20px;font-family:var(--font-display);font-weight:600;font-size:14px;cursor:pointer;transition:filter .15s;}
  .search button:hover{filter:brightness(1.08);}

  .stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;font-family:var(--font-mono);font-size:13px;color:var(--text-muted);margin-bottom:24px;}
  .stats b{color:var(--text);font-size:16px;font-weight:600;}

  .filterbar{position:sticky;top:0;z-index:20;background:rgba(18,21,28,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .row__label{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;width:52px;flex-shrink:0;}
  .tab{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-family:var(--font-body);font-size:13px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .15s;}
  select.tab{-webkit-appearance:none;-moz-appearance:none;appearance:none;padding-right:26px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%238B93A1'/></svg>");background-repeat:no-repeat;background-position:right 12px center;}
  select.tab:focus{outline:none;border-color:var(--text-muted);}
  select.tab option{background:var(--bg-panel);color:var(--text);}
  .tab:hover{border-color:var(--text-muted);color:var(--text);}
  .tab.active{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:600;}
  #regionRow .tab.active{background:var(--periwinkle);border-color:var(--periwinkle);color:#0E1220;}
  #sortRow .tab.active{background:var(--teal);border-color:var(--teal);color:#0E1220;}

  .chip{background:transparent;border:1px solid var(--border);font-family:var(--font-body);font-size:13px;padding:7px 14px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;color:var(--text-muted);}
  .chip__dot{width:8px;height:8px;border-radius:50%;}
  .chip:hover{color:var(--text);}
  .chip.active{color:var(--text);border-color:var(--chip-color,var(--text));background:color-mix(in srgb, var(--chip-color,var(--text)) 14%, transparent);}

  .remote-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer;margin-left:auto;}
  .remote-toggle input{accent-color:var(--teal);}
  .clear-btn{background:none;border:none;color:var(--text-faint);font-size:12px;text-decoration:underline;cursor:pointer;}
  .clear-btn:hover{color:var(--coral);}

  .results-head{display:flex;justify-content:space-between;align-items:baseline;padding:24px 32px 4px;font-size:13px;color:var(--text-muted);flex-wrap:wrap;gap:6px;}
  .results-head b{color:var(--text);font-family:var(--font-mono);}
  .hint{font-size:12px;color:var(--text-faint);}
  .hint button{background:none;border:none;color:var(--periwinkle);cursor:pointer;text-decoration:underline;font-size:12px;padding:0;}

  .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:16px 32px 48px;}
  .card{position:relative;background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:18px 18px 16px 22px;cursor:pointer;transition:transform .15s, border-color .15s, background .15s;overflow:hidden;display:flex;flex-direction:column;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--card-color,var(--teal));}
  .card:hover{transform:translateY(-2px);background:var(--bg-panel-hi);border-color:var(--text-faint);}
  .card.highlight{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
  .card__top{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .badge{font-family:var(--font-mono);font-size:10.5px;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;}
  .badge--cat{background:color-mix(in srgb, var(--card-color) 18%, transparent);color:var(--card-color);}
  .badge--remote{background:rgba(79,191,174,.15);color:var(--teal);}
  .badge--overseas{background:rgba(124,147,242,.15);color:var(--periwinkle);}
  .badge--type{background:rgba(139,147,161,.15);color:var(--text-muted);}
  .badge--new{background:rgba(242,169,61,.15);color:var(--gold);}
  .card__title{font-family:var(--font-display);font-size:16px;font-weight:600;margin:0 0 4px;line-height:1.4;}
  .card__company{font-size:13px;color:var(--text-muted);margin-bottom:12px;}
  .card__meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
  .card__meta .mono{font-family:var(--font-mono);}
  .card__meta-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
  .meta-row{display:flex;gap:8px;font-size:12.5px;line-height:1.5;}
  .meta-row__icon{flex-shrink:0;width:16px;display:flex;align-items:center;justify-content:center;color:var(--text-faint);padding-top:1px;}
  .meta-row__value{color:var(--text-muted);}
  .card__footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:10px;}
  .card__views{font-size:11.5px;color:var(--text-faint);}
  .card__go{font-family:var(--font-mono);font-size:12.5px;color:var(--text-faint);text-decoration:none;}
  .card__go[href]:hover{color:var(--gold);}
  .empty{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--text-faint);font-size:14px;}

  .map-section{padding:0 32px 64px;}
  .map-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .map-head h2{font-family:var(--font-display);font-size:20px;margin:0;font-weight:600;}
  .map-head p{margin:0;font-size:12px;color:var(--text-faint);font-family:var(--font-mono);}
  #map{height:460px;border-radius:14px;border:1px solid var(--border);position:relative;z-index:1;isolation:isolate;}
  @keyframes markerPulse{
    0%{ box-shadow:0 0 0 0 var(--pulse-color, rgba(242,169,61,.6)); }
    70%{ box-shadow:0 0 0 14px transparent; }
    100%{ box-shadow:0 0 0 0 transparent; }
  }
  .marker-active-pulse{ animation:markerPulse 1.4s ease-out 2; }
  .leaflet-popup-content-wrapper{background:var(--bg-panel);color:var(--text);border-radius:10px;}
  .leaflet-popup-tip{background:var(--bg-panel);}
  .popup__cat{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;color:var(--pop-color,var(--teal));}
  .popup__title{font-weight:600;font-size:14px;margin:2px 0;}
  .popup__meta{font-size:12px;color:var(--text-muted);}

  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--text-muted);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend i{width:9px;height:9px;border-radius:50%;display:inline-block;}

  footer{border-top:1px solid var(--border);padding:22px 32px;font-size:11.5px;color:var(--text-faint);line-height:1.7;}

  .filter-fab{display:none;}
  .filter-backdrop{display:none;}
  .filter-sheet-header{display:none;}
  .filter-sheet-apply{display:none;}

  @media (max-width:720px){
    .nav__links{display:none;}
    .hero{padding:44px 16px 28px;}
    .results-head, .list, .map-section{padding-left:16px;padding-right:16px;}
    .row__label{width:auto;margin-right:2px;font-size:14px;}
    .sheet-panel__row{flex-direction:column;}

    /* 篩選浮動按鈕 */
    .filter-fab{display:flex;align-items:center;gap:7px;position:fixed;right:18px;bottom:18px;z-index:45;background:var(--gold);color:#1A1207;border:none;border-radius:999px;padding:13px 20px;font-family:var(--font-display);font-weight:600;font-size:14px;box-shadow:0 8px 24px rgba(242,169,61,.4);cursor:pointer;}
    .filter-fab__badge{background:#1A1207;color:var(--gold);border-radius:999px;font-size:11px;font-family:var(--font-mono);padding:1px 7px;min-width:16px;text-align:center;}

    /* 背景遮罩 */
    .filter-backdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
    .filter-backdrop.open{opacity:1;pointer-events:auto;}

    /* 篩選面板變成底部滑出 */
    .filterbar{
      position:fixed;left:0;right:0;bottom:0;top:auto;
      max-height:82vh;overflow-y:auto;
      border-radius:22px 22px 0 0;
      border:1px solid var(--border);border-bottom:none;
      box-shadow:0 -12px 36px rgba(0,0,0,.5);
      transform:translateY(105%);
      transition:transform .28s ease;
      z-index:50;
      padding:16px 16px 12px;
      background:var(--bg-panel); /* 改成跟標題列一致的不透明底色,不再用半透明毛玻璃,避免色塊對不齊 */
      backdrop-filter:none;
    }
    .filterbar.open{transform:translateY(0);}
    .filterbar .tab, .filterbar .chip{font-size:15px;padding:9px 16px;}
    .filterbar select.tab{border-radius:999px;}
    .row--actions{flex-direction:column;align-items:stretch;gap:12px;}
    .row--actions .row__label{display:none;}
    .row--actions .remote-toggle{margin-left:0;justify-content:flex-start;font-size:15px;}
    .row--actions .clear-btn{width:100%;text-align:center;font-size:14px;}

    .filter-sheet-header{position:relative;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:19px;padding:16px 0 14px;margin:-16px -16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-panel);text-align:center;border-radius:22px 22px 0 0;}
    .filter-sheet-close{position:absolute;right:0;background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;line-height:1;padding:4px;}

    .filter-sheet-apply{display:block;position:sticky;bottom:0;background:var(--bg-panel);padding-top:12px;margin-top:12px;border-top:1px solid var(--border);}
    .filter-sheet-apply button{width:100%;background:var(--gold);color:#1A1207;border:none;border-radius:999px;padding:15px;font-family:var(--font-display);font-weight:600;font-size:16px;cursor:pointer;}
  }
</style>
</head>

<script>
/* ---------------- COLORS / PALETTE ---------------- */
const COLORS = { teal:'#4FBFAE', coral:'#E8674A', gold:'#F2A93D', periwinkle:'#7C93F2', violet:'#C77DFF' };

/* ---------------- 卡片資訊列圖示 ---------------- */
const ICON_PIN = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2C7.6 2 4 5.6 4 10c0 6 8 12 8 12s8-6 8-12c0-4.4-3.6-8-8-8z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="10" r="2.4" fill="currentColor"/></svg>`;

const ICON_MONEY = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="6" width="19" height="12" rx="2.2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2.6" stroke="currentColor" stroke-width="1.8"/></svg>`;
const ICON_GIFT = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="9" width="18" height="11" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M3 13h18M12 9v11" stroke="currentColor" stroke-width="1.8"/><path d="M12 9c-1.8 0-3-1.1-3-2.6C9 4.9 10.2 4 11.5 4 13 4 12 7 12 9zm0 0c1.8 0 3-1.1 3-2.6C15 4.9 13.8 4 12.5 4 11 4 12 7 12 9z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>`;
const ICON_CHECK = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 13l4.5 4.5L20 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const PALETTE = [COLORS.teal, COLORS.coral, COLORS.gold, COLORS.periwinkle, COLORS.violet, '#F2799E', '#8FD14F', '#5FA8D3', '#D3A6F2', '#E0B33C', '#5FD3A6', '#F25C7C', '#4FD1E0', '#F2914D', '#6C7AE0', '#B4E04F', '#E04FB8', '#4FA8E0'];
let CATS = [];
let CAT_COLOR = {};
let SHIFT_COLOR = {};
let REST_COLOR = {};

/* ---------------- CITY -> COORDS LOOKUP ---------------- */
const CITY_COORDS = {
  '台北':[25.0330,121.5654], '台北市':[25.0330,121.5654],
  '新北':[25.0120,121.4657], '新北市':[25.0120,121.4657],
  '桃園':[24.9936,121.3010], '桃園市':[24.9936,121.3010],
  '新竹':[24.8138,120.9675], '新竹市':[24.8138,120.9675], '新竹縣':[24.8387,121.0177],
  '台中':[24.1477,120.6736], '台中市':[24.1477,120.6736],

  '高雄':[22.6273,120.3014], '高雄市':[22.6273,120.3014],
  '基隆':[25.1276,121.7392], '宜蘭':[24.7021,121.7377], '花蓮':[23.9871,121.6015], '台東':[22.7583,121.1444],
  '嘉義':[23.4801,120.4491], '彰化':[24.0518,120.5161], '南投':[23.9157,120.6869], '雲林':[23.7092,120.4313], '屏東':[22.5519,120.5487],
  '新加坡':[1.3521,103.8198], '東京':[35.6762,139.6503], '首爾':[37.5665,126.9780], '香港':[22.3193,114.1694],
  '上海':[31.2304,121.4737], '深圳':[22.5431,114.0579], '北京':[39.9042,116.4074],
  '舊金山':[37.7749,-122.4194], '西雅圖':[47.6062,-122.3321], '紐約':[40.7128,-74.0060],
  '倫敦':[51.5074,-0.1278], '雪梨':[-33.8688,151.2093], '吉隆坡':[3.1390,101.6869], '曼谷':[13.7563,100.5018],
};
// 依長度排序(長的優先比對),避免「新竹市」誤配到「新竹縣」之類的問題
const CITY_KEYS_SORTED = Object.keys(CITY_COORDS).sort((a,b)=> b.length - a.length);
function findCityCoords(city){
  if(!city) return null;
  if(CITY_COORDS[city]) return CITY_COORDS[city]; // 完全比對優先
  const matched = CITY_KEYS_SORTED.find(key=> city.includes(key)); // 智慧比對:字串裡包含縣市名稱即可,例如「桃園市蘆竹區」會配到「桃園市」
  return matched ? CITY_COORDS[matched] : null;
}

const today = new Date();
const daysAgo = n => { const d = new Date(); d.setDate(d.getDate()-n); return d; };

/* ---------------- DEMO FALLBACK DATA(試算表載入成功前，或載入失敗時顯示) ---------------- */
let DATA = [
  {id:1, company:'Nordwell Systems', title:'資深後端工程師', category:'工程', city:'台北', lat:25.0330, lng:121.5654, remote:true, overseas:false, type:'外商', views:842, updated:daysAgo(2), link:null, salary:''},
  {id:2, company:'Fathom Design Studio', title:'UX 設計師', category:'設計', city:'台中', lat:24.1477, lng:120.6736, remote:false, overseas:false, type:'本土', views:212, updated:daysAgo(12), link:null, salary:''},
  {id:3, company:'Marlow Analytics', title:'資料科學家', category:'資料', city:'台北', lat:25.0210, lng:121.5445, remote:true, overseas:false, type:'外商', views:701, updated:daysAgo(1), link:null, salary:''},

/* ---------------- STATE ---------------- */
const state = { query:'', region:'all', city:'all', sort:'hot', cats:new Set(), shifts:new Set(), rests:new Set(), remoteOnly:false, activeId:null };
const REGIONS = [
  {key:'all', label:'全部'}, {key:'taiwan', label:'台灣'},
  {key:'foreign', label:'外商'},
];

  {key:'hot', label:'熱門點閱'}, {key:'remote', label:'全遠端'}, {key:'new', label:'本週新增'},
];

/* ---------------- HERO SKY ---------------- */
const sky = document.getElementById('sky');
const SKY_COLORS = [COLORS.gold, COLORS.teal, COLORS.periwinkle, COLORS.coral, COLORS.violet, '#F2799E', '#8FD14F', '#5FA8D3'];
for(let i=0;i<26;i++){
  const d = document.createElement('div');
  d.className = 'hero__dot';
  d.style.left = Math.random()*100+'%';
  d.style.top = Math.random()*100+'%';
  d.style.animationDelay = (Math.random()*4)+'s';
  d.style.background = SKY_COLORS[Math.floor(Math.random()*SKY_COLORS.length)];
  sky.appendChild(d);
}

// 流星:隨機位置、角度、間隔劃過星空區,動畫結束後自動移除
function spawnShootingStar(){
  const star = document.createElement('div');
  star.className = 'shooting-star';
  const startX = Math.random()*65; // % 由右側出發,預留飛行空間
  const startY = Math.random()*35; // % 只在上半部出現,較貼近星空感
  const angle = -25 - Math.random()*30; // 飛行角度(往左下方劃過)
  const distance = 220 + Math.random()*180;
  const rad = angle * Math.PI/180;
  const dx = Math.cos(rad)*distance;
  const dy = Math.sin(rad)*distance;
  star.style.left = startX+'%';
  star.style.top = startY+'%';
  sky.appendChild(star);
  const anim = star.animate([
    { transform:`translate(0,0) rotate(${angle}deg)`, opacity:0 },
    { transform:`translate(0,0) rotate(${angle}deg)`, opacity:1, offset:0.08 },
    { transform:`translate(${dx*0.85}px, ${dy*0.85}px) rotate(${angle}deg)`, opacity:1, offset:0.7 },
    { transform:`translate(${dx}px, ${dy}px) rotate(${angle}deg)`, opacity:0 },
  ], { duration: 1200 + Math.random()*700, easing:'linear' });
  anim.onfinish = ()=> star.remove();
}
setInterval(()=>{ if(Math.random()<0.55) spawnShootingStar(); }, 2400);
setTimeout(spawnShootingStar, 700); // 進場後不用等太久就先來一顆

/* ---------------- CATEGORY DERIVATION ---------------- */
function deriveCategories(data){
  const set = [...new Set(data.map(j=>j.category).filter(Boolean))];
  const map = {};
  set.forEach((c,i)=> map[c]=PALETTE[i%PALETTE.length]);
  return {cats:set, colorMap:map};
}

function rebuildCityUI(){
  const cityFilter = document.getElementById('cityFilter');
  const cities = [...new Set(DATA.map(j=>j.city).filter(Boolean))].sort((a,b)=> a.localeCompare(b,'zh-Hant'));
  cityFilter.innerHTML = '<option value="all">全部縣市</option>' + cities.map(c=> `<option value="${c}">${c}</option>`).join('');
  state.city = 'all';
  cityFilter.value = 'all';
}

// 通用:依資料裡實際出現的值,動態建立一列可複選的色塊篩選(職能/班別/休假共用同一套邏輯)
function buildDynamicChipRow(rowId, field, stateSet, uniformColor){
  const values = [...new Set(DATA.map(j=>j[field]).filter(Boolean))];
  const colorMap = {};
  values.forEach((v,i)=> colorMap[v] = uniformColor || PALETTE[i%PALETTE.length]);
  stateSet.clear();
  const row = document.getElementById(rowId);
  row.querySelectorAll('.chip').forEach(el=> el.remove());
  values.forEach(v=>{
    const b = document.createElement('button');
    b.className = 'chip';
    b.style.setProperty('--chip-color', colorMap[v]);
    b.innerHTML = `<span class="chip__dot" style="background:${colorMap[v]}"></span>${v}`;
    b.dataset.key = v;
    b.onclick = ()=>{ if(stateSet.has(v)) stateSet.delete(v); else stateSet.add(v); update(); };
    row.appendChild(b);
  });
  return { values, colorMap };
}

function rebuildCategoryUI(){
  ({values:CATS, colorMap:CAT_COLOR} = buildDynamicChipRow('catRow', 'category', state.cats));
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  CATS.forEach(c=> legend.innerHTML += `<span><i style="background:${CAT_COLOR[c]}"></i>${c}</span>`);
}

function rebuildShiftUI(){ ({colorMap:SHIFT_COLOR} = buildDynamicChipRow('shiftRow', 'shift', state.shifts, '#7C8F3A')); }
function rebuildRestUI(){ ({colorMap:REST_COLOR} = buildDynamicChipRow('restRow', 'restDay', state.rests, COLORS.coral)); }

/* ---------------- STATS COUNT-UP ---------------- */
function countUp(el, target){
  let cur = 0; const step = Math.max(1, Math.round(target/40));
  const t = setInterval(()=>{ cur += step; if(cur >= target){ cur = target; clearInterval(t);} el.textContent = cur; }, 20);
}
function renderStats(){
  const total = DATA.length;
  const remote = DATA.filter(j=>j.remote).length;
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `<span><b id="s2">0</b> 個職缺</span><span><b id="s3">0</b> 個可遠端</span>`;
  countUp(document.getElementById('s2'), total);
  countUp(document.getElementById('s3'), remote);
}

/* ---------------- FILTER BAR: region / sort (static) ---------------- */
const regionRow = document.getElementById('regionRow');
REGIONS.forEach(r=>{
  const b = document.createElement('button');
  b.className = 'tab' + (r.key===state.region?' active':'');
  b.textContent = r.label; b.dataset.key = r.key;
  b.onclick = ()=>{ state.region = r.key; update(); };
  regionRow.appendChild(b);
});
const sortRow = document.getElementById('sortRow');
SORTS.forEach(s=>{
  const b = document.createElement('button');
  b.className = 'tab' + (s.key===state.sort?' active':'');
  b.textContent = s.label; b.dataset.key = s.key;
  b.onclick = ()=>{ state.sort = s.key; update(); };
  sortRow.appendChild(b);
});
document.getElementById('remoteOnly').addEventListener('change', e=>{ state.remoteOnly = e.target.checked; update(); });

function openFilterSheet(){
  document.getElementById('filterbar').classList.add('open');
  document.getElementById('filterBackdrop').classList.add('open');
}
function closeFilterSheet(){
  document.getElementById('filterbar').classList.remove('open');
  document.getElementById('filterBackdrop').classList.remove('open');
}
document.getElementById('filterFab').addEventListener('click', openFilterSheet);
document.getElementById('filterBackdrop').addEventListener('click', closeFilterSheet);
document.getElementById('filterSheetClose').addEventListener('click', closeFilterSheet);
document.getElementById('filterApplyBtn').addEventListener('click', closeFilterSheet);

document.getElementById('cityFilter').addEventListener('change', e=>{ state.city = e.target.value; update(); });
document.getElementById('clearBtn').addEventListener('click', ()=>{
  state.query=''; state.region='all'; state.city='all'; state.sort='hot';
  state.cats.clear(); state.shifts.clear(); state.rests.clear(); state.remoteOnly=false;
  document.getElementById('searchInput').value=''; document.getElementById('remoteOnly').checked=false;
  document.getElementById('cityFilter').value='all';
  update();
});
// ---- GA4 事件追蹤小工具:沒接 GA 時會安靜跳過,不影響任何功能 ----
function trackEvent(name, params){
  if(typeof window.gtag === 'function'){
    window.gtag('event', name, params || {});
  }
}

document.getElementById('searchForm').addEventListener('submit', e=>{
  e.preventDefault(); state.query = document.getElementById('searchInput').value.trim(); update();
  if(state.query) trackEvent('search', { search_term: state.query });
});
function syncTabs(){
  regionRow.querySelectorAll('.tab').forEach(b=> b.classList.toggle('active', b.dataset.key===state.region));
  sortRow.querySelectorAll('.tab').forEach(b=> b.classList.toggle('active', b.dataset.key===state.sort));
  document.getElementById('catRow').querySelectorAll('.chip').forEach(b=> b.classList.toggle('active', state.cats.has(b.dataset.key)));
  document.getElementById('shiftRow').querySelectorAll('.chip').forEach(b=> b.classList.toggle('active', state.shifts.has(b.dataset.key)));
  document.getElementById('restRow').querySelectorAll('.chip').forEach(b=> b.classList.toggle('active', state.rests.has(b.dataset.key)));
}

/* ---------------- MAP ---------------- */
const map = L.map('map', { scrollWheelZoom:false }).setView([23.9, 121.0], 3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18 }).addTo(map);
const markerLayer = L.layerGroup().addTo(map);
let markers = {};
function makeIcon(color, active){
  const s = active?24:12;
  const pulseClass = active ? 'marker-active-pulse' : '';
  return L.divIcon({ className:'', html:`<div class="${pulseClass}" style="--pulse-color:${color}99;width:${s}px;height:${s}px;border-radius:50%;background:${color};border:2px solid #12151C;box-shadow:0 0 0 ${active?5:0}px ${color}55;transition:width .25s,height .25s;"></div>`, iconSize:[s,s], iconAnchor:[s/2,s/2] });
}

/* ---------------- FILTER / SORT LOGIC ---------------- */
function matchesRegion(job){
  switch(state.region){
    case 'taiwan': return !job.overseas;
    case 'overseas': return job.overseas;
    case 'foreign': return job.type === '外商';
    case 'local': return job.type === '本土';
    default: return true;
  }
}
function isNew(job){ return (today - job.updated) / 86400000 <= 7; }
function getFiltered(){
  let arr = DATA.filter(job=>{
    if(!matchesRegion(job)) return false;
    if(state.city && state.city !== 'all' && job.city !== state.city) return false;
    if(state.cats.size && !state.cats.has(job.category)) return false;
    if(state.shifts.size && !state.shifts.has(job.shift)) return false;
    if(state.rests.size && !state.rests.has(job.restDay)) return false;
    if(state.remoteOnly && !job.remote) return false;
    if(state.query){
      const tokens = state.query.split(/\s+/).filter(Boolean);
      const hay = `${job.company} ${job.title} ${job.city} ${job.category} ${job.type}`.toLowerCase();
      if(!tokens.every(t=> hay.includes(t.toLowerCase()))) return false;
    }
    return true;
  });
  if(state.sort==='hot') arr.sort((a,b)=> b.views - a.views);
  if(state.sort==='remote') arr.sort((a,b)=> (b.remote-a.remote) || (b.views-a.views));
  if(state.sort==='new') arr.sort((a,b)=> b.updated - a.updated);
  return arr;
}

/* ---------------- RENDER LIST ---------------- */
const listEl = document.getElementById('list');
function renderList(items){
  listEl.innerHTML = '';
  if(!items.length){ listEl.innerHTML = `<div class="empty">找不到符合條件的職缺 —— 試試清除篩選或換個關鍵字</div>`; return; }
  items.forEach(job=>{
    const card = document.createElement('article');
    card.className = 'card' + (job.id===state.activeId?' highlight':'');
    card.style.setProperty('--card-color', CAT_COLOR[job.category] || COLORS.teal);
    card.dataset.id = job.id;
    card.innerHTML = `
      <div class="card__top">
        ${job.type ? `<span class="badge badge--type">${job.type}</span>` : ''}
        <span class="badge badge--cat">${job.category}</span>
        ${job.shift ? `<span class="badge" style="background:color-mix(in srgb, ${SHIFT_COLOR[job.shift]||'#8B93A1'} 18%, transparent);color:${SHIFT_COLOR[job.shift]||'#8B93A1'}">${job.shift}</span>` : ''}
        ${job.restDay ? `<span class="badge" style="background:color-mix(in srgb, ${REST_COLOR[job.restDay]||'#8B93A1'} 18%, transparent);color:${REST_COLOR[job.restDay]||'#8B93A1'}">${job.restDay}</span>` : ''}
        ${job.remote?'<span class="badge badge--remote">可遠端</span>':''}
        ${job.overseas?'<span class="badge badge--overseas">海外</span>':''}
        ${isNew(job)?'<span class="badge badge--new">本週新增</span>':''}
      </div>
      <h3 class="card__title">${job.title}</h3>
      <div class="card__company">${job.company}</div>
      <div class="card__meta-list">
        <div class="meta-row"><span class="meta-row__icon" title="地區">${ICON_PIN}</span><span class="meta-row__value">${job.city}</span></div>
        ${job.workHours ? `<div class="meta-row"><span class="meta-row__icon" title="上班時間">${ICON_CLOCK}</span><span class="meta-row__value">${job.workHours}</span></div>` : ''}
        ${job.salary ? `<div class="meta-row"><span class="meta-row__icon" title="薪資">${ICON_MONEY}</span><span class="meta-row__value">${job.salary}</span></div>` : ''}
        ${job.benefits ? `<div class="meta-row"><span class="meta-row__icon" title="福利">${ICON_GIFT}</span><span class="meta-row__value">${job.benefits}</span></div>` : ''}
        ${job.info ? `<div class="meta-row"><span class="meta-row__icon" title="條件">${ICON_CHECK}</span><span class="meta-row__value">${job.info}</span></div>` : ''}
      </div>
      <div class="card__footer">
        <span class="card__views mono">${job.views} 次點閱</span>
        ${(CONTACT_LINK || job.link) ? `<a class="card__go" href="${CONTACT_LINK || job.link}" target="_blank" rel="noopener">${CONTACT_LINK ? '✦ 加LINE詢問 »' : '前往官方頁 →'}</a>` : `<span class="card__go">地圖上查看</span>`}
      </div>
    `;
    card.addEventListener('click', (e)=>{
      if(e.target.closest('a')) return;
      trackEvent('view_job', { company: job.company, job_title: job.title, category: job.category, city: job.city });
      focusJob(job.id, true);
    });
    const goLink = card.querySelector('.card__go[href]');
    if(goLink){
      goLink.addEventListener('click', ()=>{
        trackEvent('contact_click', { company: job.company, job_title: job.title, category: job.category });
      });
    }
    listEl.appendChild(card);
  });
}

/* ---------------- RENDER MAP ---------------- */
function renderMap(items){
  markerLayer.clearLayers(); markers = {};
  items.forEach(job=>{
    if(job.lat==null || job.lng==null || isNaN(job.lat) || isNaN(job.lng)) return;
    const m = L.marker([job.lat, job.lng], { icon: makeIcon(CAT_COLOR[job.category] || COLORS.teal, job.id===state.activeId) });
    m.bindPopup(`<div style="--pop-color:${CAT_COLOR[job.category]||COLORS.teal}"><div class="popup__cat">${job.category}</div><div class="popup__title">${job.title}</div><div class="popup__meta">${job.company} · ${job.city}${job.remote?' · 可遠端':''}</div></div>`);
    m.on('click', ()=> focusJob(job.id, false));
    m.addTo(markerLayer);
    markers[job.id] = m;
  });
}

function focusJob(id, flyMap){
  state.activeId = id;
  const job = DATA.find(j=>j.id===id);
  document.querySelectorAll('.card').forEach(c=> c.classList.toggle('highlight', Number(c.dataset.id)===id));
  renderMap(getFiltered());
  if(job && flyMap && job.lat!=null && job.lng!=null){
    const targetZoom = job.overseas ? 7 : 14; // 放大幅度加強,尤其是台灣本地職缺會拉得更近
    const doFly = ()=>{
      map.flyTo([job.lat, job.lng], targetZoom, { duration:1 });
      markers[id] && setTimeout(()=> markers[id].openPopup(), 550);
    };
    // 先捲動到地圖區塊,捲動結束後才開始放大聚焦,順序清楚不會兩個動作打架(桌面版、手機版都適用)
    document.getElementById('map').scrollIntoView({ behavior:'smooth', block:'center' });
    setTimeout(doFly, 450);
  }
  if(job && !flyMap){
    document.querySelector(`.card[data-id="${id}"]`)?.scrollIntoView({ behavior:'smooth', block:'center' });
  }
}

/* ---------------- GOOGLE SHEET LOADING ---------------- */
const HEADER_ALIASES = {
  company:['company','公司','公司名稱','公司名稱(中文)'],
  title:['title','job','職稱','職位','職務'],
  category:['category','職能','分類','類別'],
  city:['city','城市','地點','縣市'],
  lat:['lat','緯度','latitude','經度(緯度)'],
  lng:['lng','經度','longitude','lon','經度(經度)'],
  remote:['remote','遠端','可遠端','是否遠端','遠端工作'],
  overseas:['overseas','海外','外商','外派'],
  type:['type','類型','職務類型'],
  views:['views','點閱','點閱數','views_count'],
  updated:['updated','更新日期','date','更新','last_updated'],
  link:['link','url','連結','官網連結','官方連結','apply_link'],
  salary:['salary','薪資','薪水','薪資待遇','待遇','pay'],
  workHours:['workhours','work_hours','上班時間','工作時間','時間'],
  shift:['shift','班別','班次'],
  restDay:['restday','rest_day','休假','公休','排休','休假制度'],
  benefits:['benefits','福利','員工福利','福利制度'],
  info:['info','職缺資訊','資訊','說明','備註','description','note','條件','應徵條件','要求']
};

function normHeader(h){
  // 去除不可見字元、全形空白、前後空白，轉小寫並移除內部空白
  return String(h || '')
    .replace(/[\u200B-\u200F\uFEFF]/g,'') // invisible chars
    .replace(/\u3000/g,' ') // 全形空白轉半形
    .trim()
    .toLowerCase()
    .replace(/\s+/g,'');
}

function buildHeaderMap(headers){
  const map = {};
  if(!Array.isArray(headers)) return map;
  headers.forEach(h=>{
    const norm = normHeader(h);
    for(const [key, aliases] of Object.entries(HEADER_ALIASES)){
      if(aliases.some(a=> normHeader(a) === norm)){
        map[key] = h; // 保留原始 header 名稱以便 row[map[key]] 使用
        return;
      }
    }
    // 若沒對上，仍把原始 header 記錄為 colN 以免遺失欄位
    const idx = headers.indexOf(h);
    map[`col${idx}`] = h;
  });
  return map;
}

function parseBool(v){
  if(v === undefined || v === null) return false;
  const s = String(v).trim().toLowerCase();
  return ['true','1','是','yes','y','v','✓','remote','t','on'].includes(s);
}

function rowToJob(row, map, idx){
  const get = k => map[k] ? String(row[map[k]] ?? '').trim() : '';
  const city = get('city');
  let lat = parseFloat(get('lat').replace(/,/g,'')) || NaN;
  let lng = parseFloat(get('lng').replace(/,/g,'')) || NaN;
  if((isNaN(lat) || isNaN(lng)) && findCityCoords(city)){ [lat,lng] = findCityCoords(city); }
  const updatedRaw = get('updated');
  const updatedDate = updatedRaw ? new Date(updatedRaw) : new Date();
  return {
    id: idx+1,
    company: get('company') || '',
    title: get('title') || '',
    category: get('category') || '其他',
    city: city || '未提供地點',
    lat: isNaN(lat) ? null : lat,
    lng: isNaN(lng) ? null : lng,
    remote: parseBool(get('remote')),
    overseas: parseBool(get('overseas')),
    type: get('type') || '未提供',
    views: (parseInt(get('views').replace(/,/g,'')) || 0),
    updated: isNaN(updatedDate.getTime()) ? new Date() : updatedDate,
    link: (get('link') || null),
    salary: (get('salary') || ''),
    info: (get('info') || ''),
    workHours: (get('workHours') || ''),
    shift: (get('shift') || ''),
    restDay: (get('restDay') || ''),
    benefits: (get('benefits') || '')
  };
}

async function loadFromSheet(url){
  try{
    console.info('職缺地圖:開始從試算表載入', url);
    const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if(!idMatch) throw new Error('這不像是有效的 Google 試算表連結 (找不到 id)');
    const gidMatch = url.match(/gid=([0-9]+)/);
    const gid = gidMatch ? gidMatch[1] : '0';
    const sheetId = idMatch[1];

    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
    console.info('嘗試 CSV:', csvUrl);

    const res = await fetch(csvUrl);
    console.info('CSV status:', res.status, res.url);
    if(!res.ok) throw new Error('CSV 端點讀取失敗,請確認試算表已設為「知道連結的任何人皆可檢視」');

    const text = await res.text();
    if(text.trim().startsWith('<')) throw new Error('回傳的是 HTML 不是資料,通常代表權限沒開對,或是連結格式不正確');

    const parsedCsv = Papa.parse(text, { header:true, skipEmptyLines:true });
    if(parsedCsv.errors && parsedCsv.errors.length) console.warn('Papa.parse CSV errors:', parsedCsv.errors);
    if(!parsedCsv.data || !parsedCsv.data.length) throw new Error('試算表目前是空的');

    const map = buildHeaderMap(parsedCsv.meta.fields || []);
    console.info('CSV headers:', parsedCsv.meta.fields);
    console.info('buildHeaderMap result:', map);
    if(!map.company || !map.title) throw new Error('找不到 company 或 title 欄位,請檢查第一列欄位名稱');

    const jobs = parsedCsv.data.map((row,i)=> rowToJob(row, map, i)).filter(j=> j.company && j.title);
    if(!jobs.length) throw new Error('每一列都缺少公司或職稱,請檢查資料內容');

    DATA = jobs;
    console.info(`職缺地圖:已從 Google 試算表載入 ${jobs.length} 筆職缺`);

    // 成功後更新 UI
    state.activeId = null;
    rebuildCategoryUI();
    rebuildShiftUI();
    rebuildRestUI();
    rebuildCityUI();
    renderStats();
    update();
  }catch(err){
    console.error('職缺地圖:讀取 Google 試算表失敗 —', err.message);
    console.debug(err);
  }
}
